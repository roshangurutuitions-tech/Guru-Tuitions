# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Setup Node.js environment to build the Vite project
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 2. Install dependencies using standard install to prevent lockfile conflicts
      - name: Install dependencies
        run: npm install

      # 3. Compile the TypeScript and build the static assets
      - name: Build project
        run: npm run build
        env:
          # Passes your API key during the build phase if required by Vite's define block
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 

      # Configure the GitHub Pages deployment environment
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 4. Upload the compiled static files from Vite's target directory
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      # Deploy everything to live web hosting
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
